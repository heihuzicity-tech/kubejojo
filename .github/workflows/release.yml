name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        env:
          KUBEJOJO_WEB_OUT_DIR: ../server/internal/web/dist/app
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: server/internal/web/dist/app/**
          if-no-files-found: error

  build-packages:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: server/internal/web/dist/app

      - name: Build release archive
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SKIP_FRONTEND_BUILD: '1'
        run: |
          DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="${RELEASE_TAG#v}" DATE="${DATE_VALUE}" ./scripts/build-release.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/dist/release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten release artifacts
        run: |
          mkdir -p release-assets
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          if [[ -z "$(find release-assets -type f -name '*.tar.gz' -print -quit)" ]]; then
            echo "No release archives found" >&2
            exit 1
          fi

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: kubejojo ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
