name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Build release archive
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          NPM_INSTALL_MODE: ci
        run: |
          DATE_VALUE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="${VERSION#v}" DATE="${DATE_VALUE}" ./scripts/build-release.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/dist/release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten release artifacts
        run: |
          mkdir -p release-assets
          find release-artifacts -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          if [[ -z "$(find release-assets -type f -name '*.tar.gz' -print -quit)" ]]; then
            echo "No release archives found" >&2
            exit 1
          fi

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: kubejojo ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
